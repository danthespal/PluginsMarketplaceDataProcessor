name: Build catalog output.json

# Enriches the hand-edited source.json with live commit/release data from GitHub and publishes the
# processed output.json to the `data` branch, which the OriathHub marketplace reads.

on:
  push:
    branches: [ main ]
    paths:
      - 'source.json'
      - 'DataProcessor/**'
      - '.github/workflows/build-catalog.yml'
  schedule:
    - cron: '37 1/2 * * *'
  workflow_dispatch:

concurrency:
  group: catalog-build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build DataProcessor
        run: dotnet publish DataProcessor/DataProcessor.csproj -c Release -o dp_out

      - name: Generate output.json
        env:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet dp_out/DataProcessor.dll build source.json > data/output.json

      - name: Commit to data branch
        working-directory: data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.json
          if git diff --cached --quiet; then
            echo "No catalog changes."
          else
            git commit -m "Update output.json from ${{ github.sha }}"
            git push
          fi
